<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BBTC Court Schedule</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f3f6f9;
color:#1f2937;
}

.wrapper{
max-width:1100px;
margin:auto;
padding:20px;
}

.hero{
background:#14532d;
color:white;
padding:22px;
border-radius:14px;
margin-bottom:20px;
}

.info-row{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:12px;
margin-bottom:16px;
}

.info-card{
background:white;
padding:12px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.08);
}

.legend{
display:flex;
gap:10px;
margin-bottom:16px;
}

.legend-item{
background:white;
padding:8px 12px;
border-radius:20px;
font-size:13px;
}

.dot{
width:10px;
height:10px;
display:inline-block;
border-radius:50%;
margin-right:6px;
}

.available{background:#22c55e}
.booked{background:#f59e0b}

.schedule-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:16px;
}

.day-card{
background:white;
padding:16px;
border-radius:14px;
box-shadow:0 3px 10px rgba(0,0,0,0.07);
}

.day-header{
display:flex;
justify-content:space-between;
margin-bottom:12px;
}

.slot{
border:1px solid #e5e7eb;
border-radius:10px;
padding:12px;
margin-bottom:10px;
cursor:pointer;
}

.slot:hover{
border-color:#22c55e;
}

.badge{
font-size:12px;
padding:4px 8px;
border-radius:10px;
}

.badge.available{
background:#dcfce7;
color:#166534;
}

.badge.booked{
background:#fef3c7;
color:#92400e;
}

.modal-overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,0.5);
display:none;
align-items:center;
justify-content:center;
}

.modal{
background:white;
padding:20px;
border-radius:12px;
width:90%;
max-width:400px;
}

button{
border:none;
padding:12px 16px;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}

.btn-primary{
background:#14532d;
color:white;
}

.btn-warning{
background:#b45309;
color:white;
}

.btn-secondary{
background:#e5e7eb;
}

.refresh-btn{
width:100%;
margin-bottom:12px;
background:#14532d;
color:white;
}

.last-updated{
font-size:12px;
text-align:center;
margin-bottom:14px;
color:#6b7280;
}

@media(max-width:768px){

.info-row{
grid-template-columns:1fr;
}

.schedule-grid{
grid-template-columns:1fr;
}

}

</style>

</head>

<body>

<div class="wrapper">

<div class="hero">
<h2>Bay Breeze Tennis Club</h2>
<p>Afternoon Court Schedule (1PM – 6PM)</p>
</div>

<div class="info-row">

<div class="info-card">
<b>Court</b><br>Main Court
</div>

<div class="info-card">
<b>Viewing Period</b><br>
<span id="viewingPeriod">Loading...</span>
</div>

<div class="info-card">
<b>Today</b><br>
<span id="todayLabel">Loading...</span>
</div>

</div>

<div class="legend">

<div class="legend-item">
<span class="dot available"></span>Available
</div>

<div class="legend-item">
<span class="dot booked"></span>Booked
</div>

</div>

<button class="refresh-btn" id="refreshBtn">
Refresh Schedule
</button>

<div class="last-updated" id="lastUpdated">
Last updated: --
</div>

<div id="scheduleGrid" class="schedule-grid"></div>

</div>

<div id="modal" class="modal-overlay">

<div class="modal">

<h3>Slot Booking</h3>
<p id="modalInfo"></p>

<input id="nameInput" placeholder="Enter name" style="width:100%;padding:10px;margin-bottom:10px">

<input id="pinInput" placeholder="Enter PIN" style="width:100%;padding:10px;margin-bottom:10px">

<div style="display:flex;gap:8px">

<button class="btn-secondary" onclick="closeModal()">Close</button>

<button id="bookBtn" class="btn-primary">Book</button>

<button id="cancelBtn" class="btn-warning">Cancel Booking</button>

</div>

</div>

</div>

<script>

const WEB_APP_URL="https://script.google.com/macros/s/AKfycbxS_uCTyX9oREAWK4DQ8sdXxM9icmijnoSrguWkmLzd9VuJuhtuVz3NqCdvYPLbQskyxw/exec"

let schedule=[]
let selectedDay=""
let selectedTime=""
let mode="book"

const grid=document.getElementById("scheduleGrid")

function updateTimestamp(){

const now=new Date()

document.getElementById("lastUpdated").innerText=
"Last updated: "+now.toLocaleTimeString()

}

function group(rows){

const days=["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"]

let map={}

rows.forEach(r=>{

if(!map[r.day]){

map[r.day]={day:r.day,date:r.date,slots:[]}

}

map[r.day].slots.push(r)

})

return days.filter(d=>map[d]).map(d=>map[d])

}

async function fetchSchedule(){

grid.innerHTML="Loading..."

const r=await fetch(WEB_APP_URL+"?action=schedule")

const data=await r.json()

schedule=group(data.rows)

render()

updateTimestamp()

}

function render(){

grid.innerHTML=""

schedule.forEach((d,i)=>{

let available=d.slots.filter(s=>s.status==="available").length

let card=document.createElement("div")

card.className="day-card"

let slots=d.slots.map((s,j)=>{

return`

<div class="slot" onclick="openSlot(${i},${j})">

<div style="display:flex;justify-content:space-between">

<b>${s.time}</b>

<span class="badge ${s.status}">${s.status}</span>

</div>

<div>${s.name||"Open for booking"}</div>

</div>

`

}).join("")

card.innerHTML=`

<div class="day-header">

<div>

<b>${d.day}</b><br>
${new Date(d.date).toLocaleDateString()}

</div>

<div>${available} available</div>

</div>

${slots}

`

grid.appendChild(card)

})

}

function openSlot(d,s){

selectedDay=schedule[d].day
selectedTime=schedule[d].slots[s].time

let slot=schedule[d].slots[s]

document.getElementById("modal").style.display="flex"

document.getElementById("modalInfo").innerText=
selectedDay+" "+selectedTime

if(slot.status==="available"){

mode="book"

document.getElementById("bookBtn").style.display="block"
document.getElementById("cancelBtn").style.display="none"

}else{

mode="cancel"

document.getElementById("bookBtn").style.display="none"
document.getElementById("cancelBtn").style.display="block"

}

}

function closeModal(){

document.getElementById("modal").style.display="none"

}

document.getElementById("bookBtn").onclick=async()=>{

const name=document.getElementById("nameInput").value
const pin=document.getElementById("pinInput").value

let url=`${WEB_APP_URL}?action=book&day=${selectedDay}&time=${selectedTime}&name=${name}&pin=${pin}`

const r=await fetch(url)

const data=await r.json()

alert(data.message||data.status)

closeModal()

fetchSchedule()

}

document.getElementById("cancelBtn").onclick=async()=>{

const pin=document.getElementById("pinInput").value

let url=`${WEB_APP_URL}?action=cancel&day=${selectedDay}&time=${selectedTime}&pin=${pin}`

const r=await fetch(url)

const data=await r.json()

alert(data.message||data.status)

closeModal()

fetchSchedule()

}

document.getElementById("refreshBtn").onclick=()=>{

fetchSchedule()

}

setInterval(()=>{

if(document.getElementById("modal").style.display==="flex"){
return
}

fetchSchedule()

},30000)

fetchSchedule()

</script>

</body>
</html>
