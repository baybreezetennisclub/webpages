<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BBTC Court Schedule</title>
<style>
*{box-sizing:border-box}
:root{
--bg:#f3f6f9;--card:#ffffff;--text:#1f2937;--muted:#6b7280;
--green:#22c55e;--green-soft:#dcfce7;--green-text:#166534;
--amber:#f59e0b;--amber-soft:#fef3c7;--amber-text:#92400e;
--red:#ef4444;--red-soft:#fee2e2;--red-text:#991b1b;
--primary:#14532d;--primary-dark:#0f3d2e;--border:#e5e7eb;
--shadow:0 6px 18px rgba(0,0,0,.06)
}
body{margin:0;font-family:Arial,sans-serif;background:var(--bg);color:var(--text)}
.wrapper{max-width:1200px;margin:0 auto;padding:20px}
.hero{background:linear-gradient(135deg,var(--primary-dark),var(--primary));color:#fff;padding:24px 20px;border-radius:18px;box-shadow:0 8px 24px rgba(0,0,0,.12);margin-bottom:20px}
.hero h1{margin:0 0 8px;font-size:28px}
.hero p{margin:0;font-size:15px;line-height:1.5;opacity:.95}
.info-row{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:20px}
.info-card{background:var(--card);border-radius:14px;padding:16px;box-shadow:var(--shadow)}
.info-card .label{font-size:12px;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.info-card .value{font-size:16px;font-weight:bold}
.legend{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:20px}
.legend-item{display:inline-flex;align-items:center;gap:8px;background:var(--card);padding:10px 14px;border-radius:999px;box-shadow:0 4px 12px rgba(0,0,0,.05);font-size:14px}
.dot{width:12px;height:12px;border-radius:50%;display:inline-block}
.dot.available{background:var(--green)}
.dot.booked{background:var(--amber)}
.dot.blocked{background:var(--red)}
.schedule-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
.day-card{background:var(--card);border-radius:18px;padding:18px;box-shadow:var(--shadow)}
.day-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px}
.day-title{margin:0;font-size:20px;color:#0f172a}
.day-date{margin-top:4px;font-size:13px;color:var(--muted)}
.slot-count{font-size:12px;background:#e5e7eb;color:#374151;padding:6px 10px;border-radius:999px;font-weight:bold}
.slot{border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:12px;cursor:pointer}
.slot-top{display:flex;justify-content:space-between;margin-bottom:6px}
.time{font-weight:bold}
.badge{padding:6px 10px;border-radius:999px;font-size:12px;font-weight:bold}
.badge.available{background:var(--green-soft);color:var(--green-text)}
.badge.booked{background:var(--amber-soft);color:var(--amber-text)}
.badge.blocked{background:var(--red-soft);color:var(--red-text)}
.reserved-for{font-size:14px;color:#4b5563}
.helper-text{font-size:12px;color:var(--muted)}
.footer-note{margin-top:22px;background:var(--card);border-left:5px solid var(--primary);border-radius:12px;padding:16px;font-size:14px;line-height:1.6;box-shadow:0 4px 14px rgba(0,0,0,.05)}
.modal-overlay{position:fixed;inset:0;background:rgba(15,23,42,.58);display:none;align-items:center;justify-content:center;padding:16px;z-index:999}
.modal-overlay.active{display:flex}
.modal{width:100%;max-width:420px;background:#fff;border-radius:18px;box-shadow:0 18px 40px rgba(0,0,0,.2);overflow:hidden}
.modal-header{padding:18px 20px 10px}
.modal-body{padding:0 20px 20px}
.slot-summary{margin-top:10px;padding:12px;border-radius:10px;background:#f8fafc;font-size:14px}
.form-group{margin-top:14px}
.form-group label{display:block;font-size:14px;font-weight:bold;margin-bottom:6px}
.form-group input{width:100%;padding:10px;border:1px solid var(--border);border-radius:10px}
.modal-actions{display:flex;gap:10px;margin-top:16px}
.btn{border:0;border-radius:10px;padding:10px 14px;font-weight:bold;cursor:pointer}
.btn-primary{background:var(--primary);color:#fff}
.btn-secondary{background:#e5e7eb}
.btn-warning{background:#b45309;color:#fff}
@media(max-width:768px){.info-row{grid-template-columns:1fr}.schedule-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="wrapper">
<div class="hero">
<h1>Bay Breeze Tennis Club</h1>
<p>Afternoon court schedule (1PM–6PM). Tap an available slot to reserve.</p>
</div>

<div class="info-row">
<div class="info-card"><div class="label">Court</div><div class="value">Main Court</div></div>
<div class="info-card"><div class="label">Viewing Period</div><div class="value" id="viewingPeriod"></div></div>
<div class="info-card"><div class="label">Today</div><div class="value" id="todayLabel"></div></div>
</div>

<div class="legend">
<div class="legend-item"><span class="dot available"></span> Available</div>
<div class="legend-item"><span class="dot booked"></span> Booked</div>
</div>

<div id="scheduleGrid" class="schedule-grid"></div>

<div class="footer-note"><strong>Reminder:</strong> Only authorized schedulers may book slots.</div>
</div>

<div class="modal-overlay" id="bookingModal">
<div class="modal">
<div class="modal-header">
<h3 id="modalTitle"></h3>
<p id="modalSlotDetails"></p>
</div>
<div class="modal-body">
<div class="slot-summary" id="slotSummary"></div>

<form id="bookingForm">
<div class="form-group" id="nameGroup">
<label>Name</label>
<input id="bookingName" type="text" placeholder="Enter name">
</div>

<div class="form-group" id="bookingPinGroup">
<label>Booking PIN</label>
<input id="bookingPin" type="password" maxlength="4" placeholder="Enter PIN">
</div>

<div class="form-group" id="cancelPinGroup" style="display:none">
<label>Admin PIN</label>
<input id="cancelPin" type="password" maxlength="4" placeholder="Enter PIN">
</div>

<div class="modal-actions">
<button type="button" class="btn btn-secondary" id="closeModalBtn">Close</button>
<button type="submit" class="btn btn-primary" id="bookBtn">Book</button>
<button type="button" class="btn btn-warning" id="cancelBtn" style="display:none">Cancel Booking</button>
</div>
</form>
</div>
</div>
</div>

<script>
const BOOKING_PIN='0308'
const CANCEL_PIN='0309'

const slots=['1:00–2:00 PM','2:00–3:00 PM','3:00–4:00 PM','4:00–5:00 PM','5:00–6:00 PM']

let schedule=[]
let selected=null
let mode='book'

const grid=document.getElementById('scheduleGrid')
const modal=document.getElementById('bookingModal')
const title=document.getElementById('modalTitle')
const details=document.getElementById('modalSlotDetails')
const summary=document.getElementById('slotSummary')

const nameInput=document.getElementById('bookingName')
const bookingPin=document.getElementById('bookingPin')
const cancelPin=document.getElementById('cancelPin')

const nameGroup=document.getElementById('nameGroup')
const bookingPinGroup=document.getElementById('bookingPinGroup')
const cancelPinGroup=document.getElementById('cancelPinGroup')

const bookBtn=document.getElementById('bookBtn')
const cancelBtn=document.getElementById('cancelBtn')

function initDates(){
const today=new Date()
const day=today.getDay()
const monday=new Date(today)
const diff=day===0?-6:1-day
monday.setDate(today.getDate()+diff)

const sunday=new Date(monday)
sunday.setDate(monday.getDate()+6)

document.getElementById('todayLabel').textContent=today.toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'})

document.getElementById('viewingPeriod').textContent=
`${monday.toLocaleDateString('en-US',{month:'long',day:'numeric'})} to ${sunday.toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'})}`

schedule=[]
for(let i=0;i<7;i++){
const d=new Date(monday)
d.setDate(monday.getDate()+i)

schedule.push({
day:d.toLocaleDateString('en-US',{weekday:'long'}),
date:d,
slots:slots.map(t=>({time:t,status:'available',name:'Open for booking'}))
})
}
}

function badge(status){
return `<div class="badge ${status}">${status}</div>`
}

function render(){
grid.innerHTML=''

schedule.forEach((day,di)=>{

const available=day.slots.filter(s=>s.status==='available').length

const card=document.createElement('div')
card.className='day-card'

const slotHTML=day.slots.map((s,si)=>{
let help=s.status==='available'?'Tap to reserve':'Tap to manage'
return `
<div class="slot" data-d="${di}" data-s="${si}">
<div class="slot-top"><div class="time">${s.time}</div>${badge(s.status)}</div>
<div class="reserved-for">${s.name}</div>
<div class="helper-text">${help}</div>
</div>`
}).join('')

card.innerHTML=`
<div class="day-header">
<div>
<h2 class="day-title">${day.day}</h2>
<div class="day-date">${day.date.toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'})}</div>
</div>
<span class="slot-count">${available} available</span>
</div>
${slotHTML}`

grid.appendChild(card)
})

bind()
}

function bind(){

document.querySelectorAll('.slot').forEach(el=>{
el.onclick=()=>{

const d=el.dataset.d
const s=el.dataset.s

selected={d,s}
const slot=schedule[d].slots[s]

summary.innerHTML=`Status: ${slot.status}<br>Reserved for: ${slot.name}`

details.textContent=`${schedule[d].day} • ${slot.time}`

if(slot.status==='available'){
mode='book'
title.textContent='Reserve Slot'
nameGroup.style.display='block'
bookingPinGroup.style.display='block'
cancelPinGroup.style.display='none'
bookBtn.style.display='inline-block'
cancelBtn.style.display='none'
}else{
mode='cancel'
title.textContent='Manage Booking'
nameGroup.style.display='none'
bookingPinGroup.style.display='none'
cancelPinGroup.style.display='block'
bookBtn.style.display='none'
cancelBtn.style.display='inline-block'
}

modal.classList.add('active')
}
})
}

function closeModal(){
modal.classList.remove('active')
nameInput.value=''
bookingPin.value=''
cancelPin.value=''
}

document.getElementById('closeModalBtn').onclick=closeModal

cancelBtn.onclick=()=>{
if(cancelPin.value!==CANCEL_PIN){alert('Incorrect Admin PIN');return}

const {d,s}=selected
schedule[d].slots[s]={time:slots[s],status:'available',name:'Open for booking'}

closeModal()
render()
}

document.getElementById('bookingForm').onsubmit=e=>{
e.preventDefault()

if(mode!=='book')return

if(bookingPin.value!==BOOKING_PIN){alert('Incorrect Booking PIN');return}

const {d,s}=selected
schedule[d].slots[s].status='booked'
schedule[d].slots[s].name=nameInput.value||'Reserved'

closeModal()
render()
}

initDates()
render()
</script>

</body>
</html>
